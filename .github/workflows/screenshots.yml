name: Generate Store Screenshots

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Generate Screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            imagemagick

      - name: Install npm dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Generate Screenshots
        working-directory: apps/desktop
        run: npm run screenshots

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update store screenshots"
          title: "docs: update store screenshots"
          body: |
            This PR updates the application screenshots in `docs/media/screenshots`.
            Generated automatically via the "Generate Store Screenshots" workflow.
          branch: automation/screenshots
          base: main
          delete-branch: true
          labels: |
            documentation
            automation
