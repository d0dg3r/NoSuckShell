name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse SemVer tag
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REGEX='^v([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ ! "$TAG" =~ $REGEX ]]; then
            echo "Invalid tag format: $TAG" >&2
            echo "Expected: vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease" >&2
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          PRERELEASE="false"
          if [[ -n "${BASH_REMATCH[4]}" ]]; then
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact_name }}
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
          - os: macos-latest
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
    env:
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Sync app version from tag
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error("RELEASE_VERSION is missing");
          }

          const packageJsonPath = "apps/desktop/package.json";
          const tauriConfigPath = "apps/desktop/src-tauri/tauri.conf.json";
          const cargoTomlPath = "apps/desktop/src-tauri/Cargo.toml";

          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, "utf8"));
          tauriConfig.version = version;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const cargoToml = fs.readFileSync(cargoTomlPath, "utf8");
          let hasPackageVersion = false;
          const updatedCargoToml = cargoToml.replace(
            /(\[package\][\s\S]*?^version\s*=\s*")[^"]+(")/m,
            (_match, prefix, suffix) => {
              hasPackageVersion = true;
              return `${prefix}${version}${suffix}`;
            }
          );
          if (!hasPackageVersion) {
            throw new Error("Could not update version in Cargo.toml");
          }
          fs.writeFileSync(cargoTomlPath, updatedCargoToml);
          NODE

      - name: Generate platform icons
        working-directory: apps/desktop
        run: npx @tauri-apps/cli icon ../../img/logo_terminal.png --output src-tauri/icons

      - name: Build Tauri app bundles
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Upload platform bundles
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.app
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.rpm
            apps/desktop/src-tauri/target/release/bundle/**/*.tar.gz

  release:
    name: Publish GitHub release
    needs:
      - validate-tag
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: NoSuckShell ${{ needs.validate-tag.outputs.tag }}
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            Automated release for `${{ needs.validate-tag.outputs.tag }}`.
          files: |
            release-artifacts/**
